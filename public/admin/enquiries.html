<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enquiries | Nilecrest Admin</title>
<link rel="icon" href="../assets/images/logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="sidebarMount"></div>

<div class="main-wrap">
  <header class="topbar">
    <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="ti ti-menu-2"></i></button>
    <div class="topbar-title">Enquiries</div>
    <div class="topbar-right">
      <div class="topbar-notif" id="topbarNotif"><i class="ti ti-bell"></i><span class="notif-dot" id="notifDot" style="display:none;"></span></div>
    </div>
  </header>

  <main class="content">
    <div class="page-heading">
      <div>
        <div class="page-title">Enquiries</div>
        <div class="page-sub">Contact form submissions and bank transfer payment notices from clients.</div>
      </div>
    </div>

    <div class="stats-row" style="margin-bottom:20px;">
      <div class="stat-card"><div class="stat-icon orange"><i class="ti ti-mail-opened"></i></div><div class="stat-info"><div class="stat-val" id="cntUnread">-</div><div class="stat-lbl">Unread</div></div></div>
      <div class="stat-card"><div class="stat-icon navy"><i class="ti ti-inbox"></i></div><div class="stat-info"><div class="stat-val" id="cntTotal">-</div><div class="stat-lbl">Total</div></div></div>
      <div class="stat-card"><div class="stat-icon purple"><i class="ti ti-building-bank"></i></div><div class="stat-info"><div class="stat-val" id="cntBank">-</div><div class="stat-lbl">Bank Transfer Notices</div></div></div>
    </div>

    <div class="card">
      <div class="page-toolbar">
        <select class="filter-select" id="readFilter">
          <option value="">All</option>
          <option value="unread">Unread only</option>
          <option value="read">Read only</option>
        </select>
      </div>

      <div class="full-table-wrap">
        <table class="full-table">
          <thead><tr><th></th><th>From</th><th>Subject</th><th>Message</th><th>Received</th><th>Actions</th></tr></thead>
          <tbody id="enqBody"><tr><td colspan="6" class="table-loading">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="viewOverlay" onclick="closeViewModal()"></div>
<div class="modal" id="viewModal" style="width:min(560px,95vw);">
  <div class="modal-head">
    <div class="modal-title">Enquiry details</div>
    <button class="modal-close" onclick="closeViewModal()"><i class="ti ti-x"></i></button>
  </div>
  <div class="modal-body" id="viewModalBody"></div>
  <div class="modal-footer">
    <button class="btn-outline" onclick="closeViewModal()">Close</button>
  </div>
</div>

<style>
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; }
.modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; border-radius:12px; width:min(560px,95vw); z-index:201; box-shadow:0 20px 60px rgba(0,0,0,0.2); max-height:88vh; overflow-y:auto; }
.modal-overlay.show, .modal.show { display:block; }
.modal-head { display:flex; align-items:center; justify-content:space-between; padding:18px 20px 14px; border-bottom:0.5px solid #e2e6f0; }
.modal-title { font-size:15px; font-weight:600; color:#1B2A5E; }
.modal-close { background:none; border:none; font-size:18px; cursor:pointer; color:#94a3b8; border-radius:4px; padding:2px 4px; }
.modal-close:hover { color:#1B2A5E; background:#f0f2f8; }
.modal-body { padding:18px 20px; display:flex; flex-direction:column; gap:14px; }
.modal-footer { padding:14px 20px; border-top:0.5px solid #e2e6f0; display:flex; justify-content:flex-end; gap:10px; }
.btn-outline { padding:8px 16px; border:0.5px solid #e2e6f0; background:#fff; border-radius:6px; font-size:12.5px; font-weight:500; cursor:pointer; color:#64748b; }
.btn-outline:hover { background:#f0f2f8; }
.unread-dot { width:7px; height:7px; border-radius:50%; background:#C1440E; display:inline-block; }
.enq-row-unread td { font-weight:600; }
</style>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/department-config.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
requireLogin();
renderSidebar('enquiries');
applyDepartmentTheme();

let allEnquiries = [];

function isBankNotice(e) {
  return (e.subject || '').toLowerCase().includes('bank transfer notification');
}

async function loadEnquiries() {
  const body = document.getElementById('enqBody');
  body.innerHTML = `<tr><td colspan="6" class="table-loading">Loading...</td></tr>`;
  try {
    const data = await api('/enquiries');
    allEnquiries = data.rows;
    renderTable();
    renderStats();
  } catch (err) {
    body.innerHTML = `<tr><td colspan="6" class="table-empty">Failed to load enquiries</td></tr>`;
  }
}

function renderStats() {
  document.getElementById('cntTotal').textContent = allEnquiries.length;
  document.getElementById('cntUnread').textContent = allEnquiries.filter(e => !e.is_read).length;
  document.getElementById('cntBank').textContent = allEnquiries.filter(isBankNotice).length;
}

function renderTable() {
  const filter = document.getElementById('readFilter').value;
  let rows = allEnquiries;
  if (filter === 'unread') rows = rows.filter(e => !e.is_read);
  if (filter === 'read') rows = rows.filter(e => e.is_read);

  const body = document.getElementById('enqBody');
  if (!rows.length) {
    body.innerHTML = `<tr><td colspan="6" class="table-empty">No enquiries match this filter</td></tr>`;
    return;
  }
  body.innerHTML = rows.map(e => `
    <tr class="${!e.is_read ? 'enq-row-unread' : ''}">
      <td>${!e.is_read ? '<span class="unread-dot" title="Unread"></span>' : ''}</td>
      <td><span style="font-weight:500;">${escapeHtml(e.name)}</span><br><span style="font-size:11px;color:var(--text-3);">${escapeHtml(e.email)}</span></td>
      <td>${isBankNotice(e) ? '<span class="pill pill-review"><i class="ti ti-building-bank"></i> Bank Transfer</span>' : escapeHtml(e.subject || 'General Enquiry')}</td>
      <td style="max-width:320px;color:var(--text-2);">${escapeHtml((e.message || '').slice(0, 80))}${(e.message || '').length > 80 ? '...' : ''}</td>
      <td style="color:var(--text-2);">${timeAgo(e.created_at)}</td>
      <td><div class="action-btns">
        <button class="action-btn" title="View" onclick="viewEnquiry(${e.id})"><i class="ti ti-eye"></i></button>
      </div></td>
    </tr>`).join('');
}

document.getElementById('readFilter').addEventListener('change', renderTable);

async function viewEnquiry(id) {
  const e = allEnquiries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('viewModalBody').innerHTML = `
    <div class="detail-grid">
      <div class="detail-field"><div class="detail-label">From</div><div class="detail-value">${escapeHtml(e.name)}</div></div>
      <div class="detail-field"><div class="detail-label">Email</div><div class="detail-value">${escapeHtml(e.email)}</div></div>
      <div class="detail-field"><div class="detail-label">Phone</div><div class="detail-value">${escapeHtml(e.phone || '-')}</div></div>
      <div class="detail-field"><div class="detail-label">Received</div><div class="detail-value">${formatDate(e.created_at)}</div></div>
      <div class="detail-field" style="grid-column:1/-1;"><div class="detail-label">Subject</div><div class="detail-value">${escapeHtml(e.subject || 'General Enquiry')}</div></div>
      <div class="detail-field" style="grid-column:1/-1;"><div class="detail-label">Message</div><div class="detail-value">${escapeHtml(e.message)}</div></div>
    </div>
    ${isBankNotice(e) ? `<div style="background:#fef3c7;border-radius:8px;padding:12px;font-size:12.5px;color:#b45309;"><i class="ti ti-alert-triangle"></i> This is a bank transfer payment notice. Verify the transaction against your actual bank statement, then go to Invoices and record the payment manually.</div>` : ''}
  `;
  document.getElementById('viewOverlay').classList.add('show');
  document.getElementById('viewModal').classList.add('show');

  if (!e.is_read) {
    try {
      await api(`/enquiries/${id}/read`, { method: 'PUT' });
      e.is_read = true;
      renderTable();
      renderStats();
      if (typeof refreshNotifDropdown === 'function') refreshNotifDropdown();
    } catch {
      // Non-critical -- view still works even if marking read fails
    }
  }
}
function closeViewModal() {
  document.getElementById('viewOverlay').classList.remove('show');
  document.getElementById('viewModal').classList.remove('show');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

loadEnquiries();
</script>
</body>
</html>
